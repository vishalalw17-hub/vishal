<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Modern Shop UI + Wishlist</title>

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family: 'Segoe UI', sans-serif;
}

body{
  min-height:100vh;
  background: linear-gradient(135deg,#0f172a,#1e293b,#0f172a);
  color:white;
}

/* Header */
header{
  padding:20px;
  text-align:center;
  font-size:22px;
  font-weight:bold;
  letter-spacing:1px;
}

.topbar{
  display:flex;
  justify-content:center;
  gap:20px;
  margin-top:10px;
  font-size:14px;
}

.badge{
  background:#111827;
  padding:6px 12px;
  border-radius:20px;
  border:1px solid rgba(255,255,255,0.2);
}

/* Grid */
.container{
  display:grid;
  grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
  gap:20px;
  padding:20px;
}

/* Card */
.card{
  background: rgba(255,255,255,0.08);
  backdrop-filter: blur(12px);
  border: 1px solid rgba(255,255,255,0.15);
  border-radius: 18px;
  overflow:hidden;
  transition:0.4s;
  position:relative;
}

.card:hover{
  transform: translateY(-10px) scale(1.03);
  border:1px solid rgba(0,255,255,0.4);
}

.card img{
  width:100%;
  height:160px;
  object-fit:cover;
}

/* Wishlist button ❤️ */
.wish{
  position:absolute;
  top:10px;
  right:10px;
  background:rgba(0,0,0,0.5);
  border:none;
  color:white;
  font-size:18px;
  width:35px;
  height:35px;
  border-radius:50%;
  cursor:pointer;
  transition:0.3s;
}

.wish.active{
  color:red;
  text-shadow:0 0 10px red;
  transform:scale(1.2);
}

.content{
  padding:15px;
}

.price{
  color:#00ffcc;
  font-weight:bold;
  margin:5px 0 10px;
}

/* Button */
button.cart{
  width:100%;
  padding:10px;
  border:none;
  border-radius:12px;
  cursor:pointer;
  background: linear-gradient(45deg,#00f5a0,#00d9f5);
  color:#000;
  font-weight:bold;
}

button.cart:hover{
  transform: scale(1.05);
}
</style>
</head>

<body>

<header>
⚡ Modern Shop UI
<div class="topbar">
  <div class="badge">🛒 Cart: <span id="cart">0</span></div>
  <div class="badge">❤️ Wishlist: <span id="wishCount">0</span></div>
</div>
</header>

<div class="container">

<script>
let cart = 0;
let wish = 0;

const products = Array.from({length:20},(_,i)=>({
  id:i,
  name:`Modern Product ${i+1}`,
  price:(i+1)*199,
  img:`https://picsum.photos/400/300?random=${i}`
}));

document.write(
  products.map(p=>`
    <div class="card">
      
      <button class="wish" onclick="toggleWish(this)">❤</button>

      <img src="${p.img}">
      
      <div class="content">
        <h3>${p.name}</h3>
        <div class="price">₹${p.price}</div>
        <button class="cart" onclick="addCart()">Add to Cart</button>
      </div>
    </div>
  `).join('')
);
</script>

</div>

<script>
function addCart(){
  cart++;
  document.getElementById("cart").innerText = cart;
}

function toggleWish(btn){
  btn.classList.toggle("active");

  if(btn.classList.contains("active")){
    wish++;
  } else {
    wish--;
  }

  document.getElementById("wishCount").innerText = wish;
}
</script>

</body>
</html>
